<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird - Enhanced</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="hud">
            <div id="score-container">
                <span class="label">SCORE</span>
                <span id="score-display">0</span>
            </div>
            <div id="lives-container">
                <span class="label">LIVES</span>
                <span id="lives-display">3</span>
            </div>
            <div id="high-score-container">
                <span class="label">BEST</span>
                <span id="high-score-display">0</span>
            </div>
        </div>
        <div id="overlay">
            <div id="message-box">
                <h1 id="title">FLAPPY BIRD</h1>
                <p id="message">Ready to fly?</p>
                <button class="btn-start" onclick="handleInput()">Start Game</button>
                <button class="btn-mute" id="mute-btn" onclick="toggleAudio()">🔊 SOUND ON</button>
            </div>
        </div>
    </div>
    
    <!-- Audio elements for sound effects -->
    <audio id="wingSound" preload="auto">
        <source src="wing.ogg" type="audio/ogg">
        <source src="wing.wav" type="audio/wav">
    </audio>
    <audio id="pointSound" preload="auto">
        <source src="point.ogg" type="audio/ogg">
        <source src="point.wav" type="audio/wav">
    </audio>
    <audio id="hitSound" preload="auto">
        <source src="hit.ogg" type="audio/ogg">
        <source src="hit.wav" type="audio/wav">
    </audio>
    <audio id="dieSound" preload="auto">
        <source src="die.ogg" type="audio/ogg">
        <source src="die.wav" type="audio/wav">
    </audio>
    <audio id="swooshSound" preload="auto">
        <source src="swoosh.ogg" type="audio/ogg">
        <source src="swoosh.wav" type="audio/wav">
    </audio>
    
    <script src="script.js"></script>
</body>
</html>
